name: Deploy to MonsterASP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal
        continue-on-error: true

      - name: Publish
        run: dotnet publish src/Zadana.Api/Zadana.Api.csproj --configuration Release --output ./publish --runtime win-x86 --self-contained false

      - name: Deploy to MonsterASP
        shell: pwsh
        run: |
          $msdeploy = "C:\Program Files (x86)\IIS\Microsoft Web Deploy V3\msdeploy.exe"

          & $msdeploy `
            -verb:sync `
            -allowUntrusted `
            "-source:contentPath=${{ github.workspace }}\publish" `
            "-dest:contentPath=site57375,computerName=https://site57375.siteasp.net:8172/MsDeploy.axd?site=site57375,username=site57375,password=${{ secrets.SERVER_PASSWORD }},AuthType='Basic'" `
            -enableRule:DoNotDeleteRule `
            -enableRule:AppOffline
